name: Build Windows EXE

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install and build
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
          pip install pyinstaller
          $pyDll = python -c "import sys; from pathlib import Path; b=Path(sys.base_prefix); c=[b/f'python{sys.version_info.major}{sys.version_info.minor}.dll', b/'python3.dll']; print(next((str(p.resolve()) for p in c if p.exists()), ''))"
          $args = @('--noconfirm','--clean','--windowed','--onedir','--name','SEM-Archive','--paths','src','--collect-all','PySide6','--collect-all','pptx')
          if ($pyDll) { $args += @('--add-binary', "$pyDll;.") }
          $args += 'src/sem_archive/app.py'
          python -m PyInstaller @args
      - name: Zip artifact
        shell: pwsh
        run: |
          Compress-Archive -Path dist/SEM-Archive -DestinationPath SEM-Archive-windows.zip
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SEM-Archive-windows
          path: SEM-Archive-windows.zip
      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: SEM-Archive-windows.zip
